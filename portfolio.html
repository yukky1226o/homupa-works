<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HomuPa! Works</title>
<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getFirestore, collection, onSnapshot } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
  const firebaseConfig = {
    apiKey: "AIzaSyAf03k6fZXQxR5H__4EOJl0uKwF7ZjnCWA",
    authDomain: "homupa--works.firebaseapp.com",
    projectId: "homupa--works",
    storageBucket: "homupa--works.firebasestorage.app",
    messagingSenderId: "1007198537364",
    appId: "1:1007198537364:web:7b879d0c93f722ead09681",
    measurementId: "G-VGG21WB5SF"
  };
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  onSnapshot(collection(db,'works'), snap=>{
    let data=[];
    snap.forEach(d=>data.push({...d.data(),_docId:d.id}));
    data.sort((a,b)=>(a.order??9999)-(b.order??9999)||(b.id||0)-(a.id||0));
    window.dispatchEvent(new CustomEvent('worksLoaded',{detail:data}));
  }, ()=>window.dispatchEvent(new Event('firebaseFailed')));
</script>
<style>
:root{
  --bg:#000;--surface:#0d0d0d;--surface2:#161616;--surface3:#1c1c1e;
  --border:rgba(255,255,255,0.08);--border-hover:rgba(255,255,255,0.15);
  --text:#f5f5f7;--text-secondary:#a1a1a6;--text-tertiary:#6e6e73;
  --grad:linear-gradient(135deg,#ff3a56,#0daeec);
  --grad-text:linear-gradient(90deg,#ff3a56,#c044cc 50%,#0daeec);
  --radius:18px;--radius-sm:10px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Helvetica Neue",Arial,sans-serif;
  background:var(--bg);color:var(--text);min-height:100vh;
  /* 横スクロール防止 */
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}

/* ── HEADER ── */
header{
  position:sticky;top:0;z-index:100;
  background:rgba(0,0,0,0.72);backdrop-filter:saturate(180%) blur(20px);
  border-bottom:1px solid var(--border);
  padding:0 2.5rem;height:52px;
  display:flex;align-items:center;justify-content:space-between;
}
.logo{font-size:1.05rem;font-weight:600;letter-spacing:-0.02em;display:flex;align-items:center;}
.logo-grad{background:var(--grad-text);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;font-weight:700;}
.header-right{display:flex;align-items:center;gap:0.75rem;}
.header-count{font-size:0.75rem;color:var(--text-tertiary);}
.admin-link{font-size:0.73rem;color:var(--text-tertiary);background:var(--surface2);border:1px solid var(--border);padding:0.22rem 0.65rem;border-radius:980px;text-decoration:none;transition:all 0.18s;}
.admin-link:hover{color:var(--text);border-color:var(--border-hover);}
/* スマホ用検索アイコン（デフォルト非表示） */
.search-icon-btn{
  display:none;width:34px;height:34px;border-radius:50%;
  background:var(--surface2);border:1px solid var(--border);
  align-items:center;justify-content:center;
  cursor:pointer;color:var(--text-secondary);transition:all 0.18s;flex-shrink:0;
}

/* ── HERO ── */
.hero{padding:6rem 2.5rem 4rem;text-align:center;position:relative;overflow:hidden;}
.hero-glow{position:absolute;top:0;left:50%;transform:translateX(-50%);width:900px;height:500px;background:radial-gradient(ellipse at center top,rgba(255,58,86,0.12) 0%,rgba(13,174,236,0.08) 40%,transparent 70%);pointer-events:none;}
.hero-eyebrow{font-size:0.75rem;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;background:var(--grad-text);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:1.25rem;display:inline-block;}
.hero-title{font-size:clamp(2.8rem,6vw,5.2rem);font-weight:700;letter-spacing:-0.04em;line-height:1.04;margin-bottom:1.25rem;}
.hero-title .grad{background:var(--grad-text);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.hero-sub{font-size:1.05rem;color:var(--text-secondary);line-height:1.7;max-width:480px;margin:0 auto;font-weight:300;}

/* ── CONTROLS ── */
.controls{
  position:sticky;top:52px;z-index:90;
  background:rgba(0,0,0,0.88);backdrop-filter:saturate(180%) blur(20px);
  border-bottom:1px solid var(--border);
  padding:0.85rem 2.5rem;
  /* 横はみ出し防止 */
  width:100%;overflow:hidden;
}

/* PC: 検索行 */
.search-row{display:flex;gap:0.75rem;margin-bottom:0.85rem;align-items:center;}
.search-box{
  flex:1;display:flex;align-items:center;gap:0.6rem;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:980px;padding:0.5rem 1.1rem;
  transition:border-color 0.2s,background 0.2s;
  min-width:0; /* flexで縮む */
}
.search-box:focus-within{border-color:rgba(255,58,86,0.4);background:var(--surface3);}
.search-box svg{color:var(--text-tertiary);flex-shrink:0;}
.search-box input{background:none;border:none;outline:none;color:var(--text);font-family:inherit;font-size:0.875rem;width:100%;min-width:0;}
.search-box input::placeholder{color:var(--text-tertiary);}
.clear-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text-secondary);padding:0.5rem 1.1rem;border-radius:980px;cursor:pointer;font-family:inherit;font-size:0.8rem;transition:all 0.18s;white-space:nowrap;flex-shrink:0;}
.clear-btn:hover{background:var(--surface3);border-color:var(--border-hover);color:var(--text);}

/* フィルター行 */
.filter-row{display:flex;flex-direction:column;gap:0.5rem;}
.filter-group{display:flex;align-items:center;gap:0.65rem;}
.filter-label{
  font-size:0.63rem;font-weight:600;letter-spacing:0.07em;text-transform:uppercase;
  color:var(--text-tertiary);white-space:nowrap;flex-shrink:0;min-width:44px;
}
/* タグ群：横スクロールのみ */
.filter-tags{
  display:flex;gap:0.3rem;
  overflow-x:auto;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
  /* はみ出し防止：親を超えない */
  min-width:0;
  flex:1;
  padding-bottom:2px;
}
.filter-tags::-webkit-scrollbar{display:none;}
.tag{
  padding:0.25rem 0.7rem;border:1px solid var(--border);border-radius:980px;
  font-size:0.77rem;font-family:inherit;cursor:pointer;transition:all 0.18s;
  color:var(--text-secondary);background:transparent;white-space:nowrap;flex-shrink:0;
}
.tag:hover{border-color:var(--border-hover);color:var(--text);background:var(--surface2);}
.tag.active{background:var(--grad);border-color:transparent;color:#fff;font-weight:500;}

/* スマホ検索オーバーレイ */
.search-overlay{
  position:fixed;inset:0;z-index:500;
  background:rgba(0,0,0,0.95);backdrop-filter:blur(20px);
  display:none;flex-direction:column;
  padding:1.5rem 1.25rem;
}
.search-overlay.open{display:flex;}
.search-overlay-bar{
  display:flex;align-items:center;gap:0.75rem;
  background:var(--surface2);border:1px solid rgba(255,58,86,0.4);
  border-radius:14px;padding:0.8rem 1.1rem;margin-bottom:1rem;
}
.search-overlay-bar svg{color:var(--text-tertiary);flex-shrink:0;}
.search-overlay-bar input{background:none;border:none;outline:none;color:var(--text);font-family:inherit;font-size:1rem;width:100%;}
.search-overlay-bar input::placeholder{color:var(--text-tertiary);}
.search-overlay-close{
  background:none;border:1px solid var(--border);color:var(--text-secondary);
  font-family:inherit;font-size:0.85rem;cursor:pointer;
  padding:0.55rem 1.1rem;border-radius:980px;align-self:flex-start;
}

/* ── GRID SECTION ── */
.grid-section{padding:2rem 2.5rem 6rem;}
.grid-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;}
.result-count{font-size:0.8rem;color:var(--text-tertiary);}
.result-count strong{color:var(--text-secondary);font-weight:500;}
.grid{
  display:grid;grid-template-columns:repeat(3,1fr);
  gap:1.5px;background:var(--border);
  border-radius:var(--radius);overflow:hidden;
}

/* ── CARD ── */
.card{background:var(--bg);cursor:pointer;position:relative;transition:background 0.25s;display:flex;flex-direction:column;}
.card:hover{background:var(--surface);}

/* サムネイル */
.card-thumb{
  aspect-ratio:16/9;overflow:hidden;position:relative;
  /* はみ出し完全防止 */
  width:100%;
}
.card-thumb-inner{
  width:100%;height:100%;
  display:flex;align-items:center;justify-content:center;
  transition:transform 0.45s cubic-bezier(0.34,1.56,0.64,1);
  overflow:hidden; /* 子要素のはみ出し防止 */
}
.card-thumb-inner img{width:100%;height:100%;object-fit:cover;display:block;flex-shrink:0;}
.card:hover .card-thumb-inner{transform:scale(1.07);}
.card-thumb::after{content:'';position:absolute;inset:0;background:linear-gradient(to bottom,transparent 50%,rgba(0,0,0,0.55) 100%);opacity:0;transition:opacity 0.3s;}
.card:hover .card-thumb::after{opacity:1;}
.view-label{
  position:absolute;bottom:0.85rem;left:50%;
  transform:translateX(-50%) translateY(8px);
  background:rgba(255,255,255,0.11);border:1px solid rgba(255,255,255,0.18);
  backdrop-filter:blur(12px);color:#fff;font-size:0.68rem;font-weight:500;
  letter-spacing:0.08em;text-transform:uppercase;
  padding:0.28rem 0.85rem;border-radius:980px;
  opacity:0;transition:all 0.28s;z-index:2;white-space:nowrap;
}
.card:hover .view-label{opacity:1;transform:translateX(-50%) translateY(0);}

/* COMING SOON サムネイル（カード用） */
.cs-thumb{
  width:100%;height:100%;
  background:#888;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;
  /* はみ出し防止 */
  overflow:hidden;position:absolute;inset:0;
}
.cs-thumb .cs-line{width:22px;height:1px;background:rgba(255,255,255,0.8);}
.cs-thumb .cs-label{font-size:0.55rem;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;color:#fff;white-space:nowrap;}

/* カード本文 */
.card-body{padding:1rem 1.25rem 1.25rem;flex:1;display:flex;flex-direction:column;}
.card-chips{display:flex;gap:0.3rem;flex-wrap:wrap;margin-bottom:0.55rem;}
.chip{font-size:0.63rem;font-weight:500;padding:0.17rem 0.5rem;border-radius:980px;background:var(--surface2);color:var(--text-tertiary);border:1px solid var(--border);}
.chip.primary{background:linear-gradient(135deg,rgba(255,58,86,0.15),rgba(13,174,236,0.15));border-color:rgba(255,58,86,0.25);color:#e06070;}
.card-title{font-size:0.95rem;font-weight:600;letter-spacing:-0.02em;line-height:1.3;margin-bottom:0.3rem;}
.card-client{font-size:0.73rem;color:var(--text-tertiary);margin-bottom:0.45rem;}
.card-desc{font-size:0.77rem;color:var(--text-tertiary);line-height:1.65;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;flex:1;}
.card-footer{display:flex;align-items:center;justify-content:space-between;margin-top:0.8rem;padding-top:0.8rem;border-top:1px solid var(--border);}
.card-year{font-size:0.7rem;color:var(--text-tertiary);}
.card-cta{font-size:0.7rem;font-weight:500;background:var(--grad-text);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;opacity:0;transition:opacity 0.2s;}
.card:hover .card-cta{opacity:1;}

.no-results{display:none;grid-column:1/-1;text-align:center;padding:6rem 2rem;background:var(--bg);}
.no-results h3{font-size:1.4rem;font-weight:600;color:var(--text-tertiary);margin-bottom:0.5rem;}
.no-results p{font-size:0.85rem;color:var(--text-tertiary);}

/* ── MODAL ── */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,0.75);backdrop-filter:blur(24px);z-index:300;display:none;align-items:center;justify-content:center;padding:2rem;}
.modal-backdrop.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:22px;width:100%;max-width:760px;max-height:90vh;overflow-y:auto;animation:mup 0.3s cubic-bezier(0.34,1.56,0.64,1);}
@keyframes mup{from{transform:scale(0.93) translateY(20px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}
.modal::-webkit-scrollbar{display:none;}
.modal-thumb{width:100%;aspect-ratio:16/9;display:flex;align-items:center;justify-content:center;border-radius:22px 22px 0 0;position:relative;overflow:hidden;}
.modal-thumb img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;}
/* COMING SOON モーダル用 */
.cs-modal{position:absolute;inset:0;background:#888;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;}
.cs-modal .cs-line{width:28px;height:1px;background:rgba(255,255,255,0.8);}
.cs-modal .cs-label{font-size:0.68rem;font-weight:700;letter-spacing:0.22em;text-transform:uppercase;color:#fff;}
.modal-close{position:absolute;top:1rem;right:1rem;width:30px;height:30px;background:rgba(0,0,0,0.45);border:1px solid rgba(255,255,255,0.15);backdrop-filter:blur(8px);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;z-index:10;transition:background 0.18s;}
.modal-close:hover{background:rgba(255,255,255,0.12);}
.modal-content{padding:2rem 2.5rem 2.5rem;}
.modal-chips{display:flex;gap:0.4rem;flex-wrap:wrap;margin-bottom:1rem;}
.modal-title{font-size:1.9rem;font-weight:700;letter-spacing:-0.04em;line-height:1.1;margin-bottom:0.3rem;}
.modal-client{font-size:0.85rem;color:var(--text-tertiary);margin-bottom:1.25rem;}
.modal-desc{font-size:0.9rem;line-height:1.85;color:var(--text-secondary);margin-bottom:2rem;font-weight:300;}
.modal-specs{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:1px;background:var(--border);border-radius:var(--radius-sm);overflow:hidden;margin-bottom:1.75rem;}
.spec-item{background:var(--surface2);padding:0.85rem 1.1rem;}
.spec-label{font-size:0.6rem;font-weight:500;letter-spacing:0.07em;text-transform:uppercase;color:var(--text-tertiary);margin-bottom:0.3rem;}
.spec-value{font-size:0.88rem;font-weight:500;}
.modal-tech-label{font-size:0.6rem;font-weight:500;letter-spacing:0.07em;text-transform:uppercase;color:var(--text-tertiary);margin-bottom:0.65rem;}
.tech-list{display:flex;flex-wrap:wrap;gap:0.45rem;margin-bottom:2rem;}
.tech-chip{background:var(--surface3);border:1px solid var(--border);padding:0.3rem 0.8rem;border-radius:980px;font-size:0.78rem;color:var(--text-secondary);}
.modal-link{display:inline-flex;align-items:center;gap:0.45rem;background:var(--grad);color:#fff;padding:0.75rem 1.6rem;border-radius:980px;text-decoration:none;font-weight:600;font-size:0.88rem;transition:opacity 0.18s;}
.modal-link:hover{opacity:0.85;}

::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:3px;}

/* ── RESPONSIVE ── */
@media(max-width:1024px){
  .grid{grid-template-columns:repeat(2,1fr);}
}

@media(max-width:640px){
  /* ヘッダー */
  header{padding:0 1rem;}
  .header-count{display:none;}
  .search-icon-btn{display:flex;}

  /* ヒーロー */
  .hero{padding:2.5rem 1.25rem 1.75rem;}
  .hero-title{font-size:2.2rem;}
  .hero-sub{font-size:0.88rem;}

  /* controls */
  .controls{padding:0.6rem 1rem;}
  /* PC検索欄を非表示 → スマホはオーバーレイ */
  .search-row{display:none;}

  /* フィルター：縦並び、タグだけ横スクロール */
  .filter-row{flex-direction:column;gap:0.55rem;}
  .filter-group{flex-direction:row;align-items:center;gap:0.5rem;}
  .filter-label{font-size:0.6rem;min-width:42px;}
  .tag{font-size:0.72rem;padding:0.22rem 0.6rem;}

  /* グリッド */
  .grid-section{padding:1.25rem 1rem 4rem;}
  .grid{grid-template-columns:1fr;border-radius:var(--radius-sm);}

  /* モーダル */
  .modal-backdrop{padding:0.5rem;}
  .modal{border-radius:16px;}
  .modal-content{padding:1.25rem 1.25rem 2rem;}
  .modal-title{font-size:1.4rem;}
  .modal-desc{font-size:0.85rem;}
  .modal-content .modal-link{width:100%;justify-content:center;}
}
</style>
</head>
<body>

<header>
  <div class="logo"><span class="logo-grad">HomuPa!</span>&nbsp;Works</div>
  <div class="header-right">
    <span class="header-count" id="headerCount">0 projects</span>
    <button class="search-icon-btn" onclick="openSearchOverlay()" aria-label="検索">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    </button>
    <a href="admin.html" class="admin-link">管理画面</a>
  </div>
</header>

<!-- スマホ検索オーバーレイ -->
<div class="search-overlay" id="searchOverlay">
  <div class="search-overlay-bar">
    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="searchOverlayInput" placeholder="キーワードで検索（飲食・シンプル・LP など）" autocomplete="off">
  </div>
  <button class="search-overlay-close" onclick="closeSearchOverlay()">✕ 閉じる</button>
</div>

<section class="hero">
  <div class="hero-glow"></div>
  <div class="hero-eyebrow">Portfolio / Selected Works</div>
  <h1 class="hero-title">Our <span class="grad">Best</span><br>Web Works</h1>
  <p class="hero-sub">業種・雰囲気・カテゴリから<br>お気に入りの制作実績を見つけてください。</p>
</section>

<div class="controls" id="controls">
  <div class="search-row">
    <div class="search-box">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="searchInput" placeholder="キーワードで検索（例：飲食、シンプル、LP）">
    </div>
    <button class="clear-btn" onclick="clearAll()">クリア</button>
  </div>
  <div class="filter-row">
    <div class="filter-group">
      <div class="filter-label">業種</div>
      <div class="filter-tags" id="industryFilters"></div>
    </div>
    <div class="filter-group">
      <div class="filter-label">雰囲気</div>
      <div class="filter-tags" id="moodFilters"></div>
    </div>
    <div class="filter-group">
      <div class="filter-label">カテゴリ</div>
      <div class="filter-tags" id="categoryFilters"></div>
    </div>
  </div>
</div>

<section class="grid-section">
  <div class="grid-meta">
    <div class="result-count" id="resultCount"><strong>0</strong> 件の実績</div>
  </div>
  <div class="grid" id="grid">
    <div class="no-results" id="noResults">
      <h3>No Results</h3>
      <p>条件に一致する実績が見つかりませんでした</p>
    </div>
  </div>
</section>

<div class="modal-backdrop" id="modal" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-thumb" id="modalThumb">
      <button class="modal-close" onclick="closeModalDirect()">
        <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="modal-content">
      <div class="modal-chips" id="modalChips"></div>
      <h2 class="modal-title" id="modalTitle"></h2>
      <div class="modal-client" id="modalClient"></div>
      <p class="modal-desc" id="modalDesc"></p>
      <div class="modal-specs" id="modalSpecs"></div>
      <div class="modal-tech-label">使用技術・ツール</div>
      <div class="tech-list" id="modalTechs"></div>
      <a href="#" class="modal-link" id="modalLink" target="_blank">
        サイトを見る
        <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M7 17 17 7M7 7h10v10"/></svg>
      </a>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'homupaWorks';
const fallback = [
  {id:1,title:"Sakura Blossom Cafe",client:"株式会社サクラブロッサム",year:2024,industry:"飲食",mood:"ナチュラル",category:"コーポレート",bg:"#555",image:null,desc:"都内4店舗のカフェチェーンブランドサイト。スマホ対応強化でモバイル流入+45%を達成。",techs:["WordPress","WooCommerce","GSAP"],url:"#",specs:{制作期間:"6週間",ページ数:"12P",対応:"レスポンシブ"}},
  {id:2,title:"NEXUS Architecture",client:"NEXUS一級建築士事務所",year:2024,industry:"建築・不動産",mood:"ラグジュアリー",category:"コーポレート",bg:"#555",image:null,desc:"高級住宅・商業施設を手がける建築事務所。問い合わせ件数が改修後2.3倍に増加。",techs:["Next.js","Framer Motion","Three.js"],url:"#",specs:{制作期間:"10週間",ページ数:"8P",対応:"レスポンシブ"}}
];

let works = [];
const active = {industry:new Set(), mood:new Set(), category:new Set()};
let q = '';

function initWithData(data) {
  works = data.length ? data : (JSON.parse(localStorage.getItem(STORAGE_KEY)||'null') || fallback);
  buildFilters();
  renderGrid();
}
window.addEventListener('worksLoaded', e => initWithData(e.detail));
window.addEventListener('firebaseFailed', () => initWithData(JSON.parse(localStorage.getItem(STORAGE_KEY)||'null') || fallback));
setTimeout(() => { if (!works.length) initWithData(JSON.parse(localStorage.getItem(STORAGE_KEY)||'null') || fallback); }, 3000);

function buildFilters() {
  const map = {industry:'industryFilters', mood:'moodFilters', category:'categoryFilters'};
  const defs = {
    industry:[...new Set(works.map(w=>w.industry).filter(Boolean))],
    mood:[...new Set(works.map(w=>w.mood).filter(Boolean))],
    category:[...new Set(works.map(w=>w.category).filter(Boolean))]
  };
  for (const [key, id] of Object.entries(map)) {
    const el = document.getElementById(id);
    el.innerHTML = '';
    defs[key].forEach(val => {
      const btn = document.createElement('button');
      btn.className = 'tag';
      btn.textContent = val;
      btn.onclick = () => {
        active[key].has(val) ? active[key].delete(val) : active[key].add(val);
        btn.classList.toggle('active');
        renderGrid();
      };
      el.appendChild(btn);
    });
  }
}

document.getElementById('searchInput').addEventListener('input', e => { q = e.target.value; renderGrid(); });

function openSearchOverlay() {
  document.getElementById('searchOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
  setTimeout(() => document.getElementById('searchOverlayInput').focus(), 100);
}
function closeSearchOverlay() {
  document.getElementById('searchOverlay').classList.remove('open');
  document.body.style.overflow = '';
}
document.getElementById('searchOverlayInput').addEventListener('input', e => {
  q = e.target.value;
  document.getElementById('searchInput').value = q;
  renderGrid();
});

function clearAll() {
  for (const k in active) active[k].clear();
  document.querySelectorAll('.tag.active').forEach(t => t.classList.remove('active'));
  document.getElementById('searchInput').value = '';
  document.getElementById('searchOverlayInput').value = '';
  q = '';
  renderGrid();
}

function getFiltered() {
  return works.filter(w => {
    const lq = q.toLowerCase();
    if (lq && ![w.title,w.client,w.desc,w.industry,w.mood,w.category].some(s=>(s||'').toLowerCase().includes(lq))) return false;
    if (active.industry.size && !active.industry.has(w.industry)) return false;
    if (active.mood.size && !active.mood.has(w.mood)) return false;
    if (active.category.size && !active.category.has(w.category)) return false;
    return true;
  });
}

/* COMING SOON HTML（カード用）*/
function csThumbHTML() {
  return `<div class="cs-thumb">
    <div class="cs-line"></div>
    <div class="cs-label">Coming Soon</div>
    <div class="cs-line"></div>
  </div>`;
}

function renderGrid() {
  if (!works.length) return;
  const grid = document.getElementById('grid');
  grid.querySelectorAll('.card').forEach(c => c.remove());
  const list = getFiltered();
  document.getElementById('resultCount').innerHTML = `<strong>${list.length}</strong> 件の実績`;
  document.getElementById('headerCount').textContent = `${list.length} projects`;
  document.getElementById('noResults').style.display = list.length ? 'none' : 'block';

  list.forEach(w => {
    const card = document.createElement('div');
    card.className = 'card';

    // サムネイル：画像があればimgタグ、なければCOMING SOON
    const thumbContent = w.image
      ? `<img src="${w.image}" alt="${w.title}" style="width:100%;height:100%;object-fit:cover;display:block;">`
      : csThumbHTML();

    card.innerHTML = `
      <div class="card-thumb">
        <div class="card-thumb-inner">${thumbContent}</div>
        <span class="view-label">詳細を見る</span>
      </div>
      <div class="card-body">
        <div class="card-chips">
          <span class="chip primary">${w.industry||''}</span>
          <span class="chip">${w.mood||''}</span>
          <span class="chip">${w.category||''}</span>
        </div>
        <div class="card-title">${w.title}</div>
        <div class="card-client">${w.client}</div>
        <div class="card-desc">${w.desc}</div>
        <div class="card-footer">
          <span class="card-year">${w.year}</span>
          <span class="card-cta">詳細を見る →</span>
        </div>
      </div>`;
    card.onclick = () => openModal(w);
    grid.appendChild(card);
  });
}

function openModal(w) {
  const thumb = document.getElementById('modalThumb');
  thumb.style.background = '#888';
  // 既存のimg/cs-modalを削除
  thumb.querySelectorAll('img, .cs-modal').forEach(el => el.remove());

  if (w.image) {
    const img = document.createElement('img');
    img.src = w.image;
    img.alt = w.title;
    thumb.appendChild(img);
  } else {
    const cs = document.createElement('div');
    cs.className = 'cs-modal';
    cs.innerHTML = `<div class="cs-line"></div><div class="cs-label">Coming Soon</div><div class="cs-line"></div>`;
    thumb.appendChild(cs);
  }

  document.getElementById('modalChips').innerHTML =
    `<span class="chip primary">${w.industry||''}</span><span class="chip">${w.mood||''}</span><span class="chip">${w.category||''}</span>`;
  document.getElementById('modalTitle').textContent = w.title;
  document.getElementById('modalClient').textContent = 'クライアント：' + w.client;
  document.getElementById('modalDesc').textContent = w.desc;
  document.getElementById('modalLink').href = w.url || '#';
  document.getElementById('modalSpecs').innerHTML = Object.entries(w.specs||{}).map(([k,v]) =>
    `<div class="spec-item"><div class="spec-label">${k}</div><div class="spec-value">${v}</div></div>`).join('');
  document.getElementById('modalTechs').innerHTML = (w.techs||[]).map(t =>
    `<span class="tech-chip">${t}</span>`).join('');

  document.getElementById('modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeModal(e) { if (e.target === document.getElementById('modal')) closeModalDirect(); }
function closeModalDirect() { document.getElementById('modal').classList.remove('open'); document.body.style.overflow = ''; }
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeModalDirect(); closeSearchOverlay(); }
});
</script>
</body>
</html>
